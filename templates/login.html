<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(to bottom right, #0f172a, #020617);
    }
  </style>
</head>

<body class="h-full flex items-center justify-center text-white">

  <div class="w-full max-w-md p-8 rounded-3xl bg-white/10 backdrop-blur-lg border border-white/10 shadow-2xl">

    <h1 class="text-3xl font-bold mb-2 text-center">
      Welcome Back
    </h1>

    <p class="text-slate-400 text-center mb-6">
      Sign in to continue
    </p>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}

          <div class="mb-4 px-4 py-3 rounded-xl
            {% if category == 'success' %}
              bg-green-500/20 text-green-300 border border-green-500/30
            {% else %}
              bg-red-500/20 text-red-300 border border-red-500/30
            {% endif %}
          ">
            {{ message }}
          </div>

        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- IMPORTANT CHANGES HERE -->
    <form
      method="POST"
      action="{{ url_for('login') }}"
      class="space-y-4"
    >

      <div>
        <label class="block mb-1 text-sm text-slate-300">
          Email
        </label>

        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          required
          class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-cyan-500"
        />
      </div>

      <div>
        <label class="block mb-1 text-sm text-slate-300">
          Password
        </label>

        <input
          type="password"
          name="password"
          placeholder="Enter your password"
          required
          class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-cyan-500"
        />
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2">
          <input type="checkbox"/>
          Remember me
        </label>

        <a href="{{ url_for('forgot_password') }}"
   class="text-cyan-400 hover:underline">
    Forgot password?
</a>
      </div>

      <button
        type="submit"
        class="w-full py-3 rounded-xl bg-cyan-500 hover:bg-cyan-400 transition font-semibold"
      >
        Sign In
      </button>

    </form>

    <p class="text-center text-slate-400 mt-6">
      Don’t have an account?

      <a
        href="{{ url_for('signup') }}"
        class="text-cyan-400 hover:underline"
      >
        Sign Up
      </a>
    </p>

  </div>

</body>
</html>
