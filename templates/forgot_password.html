<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center">

    <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 w-full max-w-md">

        <h2 class="text-2xl font-bold mb-6 text-cyan-400">
            Reset Password
        </h2>

        <form method="POST">

            <div class="mb-4">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    required
                    class="w-full mt-1 px-3 py-2 rounded-xl bg-slate-800 border border-slate-700">
            </div>

            <div class="mb-4">
                <label>New Password</label>
                <input
                    type="password"
                    name="password"
                    required
                    class="w-full mt-1 px-3 py-2 rounded-xl bg-slate-800 border border-slate-700">
            </div>

            <div class="mb-6">
                <label>Confirm Password</label>
                <input
                    type="password"
                    name="confirm_password"
                    required
                    class="w-full mt-1 px-3 py-2 rounded-xl bg-slate-800 border border-slate-700">
            </div>

            <button
                type="submit"
                class="w-full bg-cyan-500 text-slate-950 font-semibold py-3 rounded-xl">
                Update Password
            </button>

        </form>

    </div>

</body>
</html>
