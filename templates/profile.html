<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Profile</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-slate-100 min-h-screen">

  <div class="max-w-3xl mx-auto px-4 py-10">

    <!-- TOP -->
    <div class="flex items-center justify-between mb-8">

      <div>
        <h1 class="text-4xl font-bold text-cyan-400">
          Profile
        </h1>

        <p class="text-slate-400 mt-1">
          Your account information
        </p>
      </div>

      <a
        href="{{ url_for('index') }}"
        class="px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 hover:bg-slate-700 transition"
      >
        Dashboard
      </a>

    </div>


    <!-- PROFILE CARD -->
    <div class="rounded-3xl bg-slate-900 border border-slate-800 p-8">

      <div class="flex flex-col items-center text-center">

        <!-- AVATAR -->
        <div class="w-24 h-24 rounded-full bg-cyan-500 flex items-center justify-center text-4xl font-bold text-slate-950 mb-5">

          {{ user.username[0]|upper }}

        </div>

        <!-- USERNAME -->
        <h2 class="text-3xl font-bold">

          {{ user.username }}

        </h2>

        <!-- EMAIL -->
        <p class="text-slate-400 mt-2">

          {{ user.email }}

        </p>

      </div>


      <!-- STATS -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mt-10">

        <!-- TOTAL EXPENSES -->
        <div class="rounded-2xl bg-slate-800 border border-slate-700 p-5">

          <p class="text-slate-400 text-sm mb-2">
            Total Expenses
          </p>

          <h3 class="text-3xl font-bold text-cyan-400">

            ₹ {{ '%.2f'|format(total_expenses or 0) }}

          </h3>

        </div>

        <!-- TOTAL TRANSACTIONS -->
        <div class="rounded-2xl bg-slate-800 border border-slate-700 p-5">

          <p class="text-slate-400 text-sm mb-2">
            Total Transactions
          </p>

          <h3 class="text-3xl font-bold text-emerald-400">

            {{ total_transactions }}

          </h3>

        </div>

      </div>


      <!-- LOGOUT -->
      <div class="mt-10">

        <a
          href="{{ url_for('logout') }}"
          class="w-full block text-center rounded-2xl bg-rose-500/10 border border-rose-500/20 text-rose-300 hover:bg-rose-500/20 transition px-5 py-4 font-semibold"
        >
          Logout
        </a>

      </div>

    </div>

  </div>

</body>

</html>
